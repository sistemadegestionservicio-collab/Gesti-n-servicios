<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Líderes</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 font-sans min-h-screen flex flex-col items-center justify-center p-4 selection:bg-blue-600 selection:text-white">

    <div class="bg-white p-8 md:p-10 rounded-3xl shadow-2xl w-full max-w-md border border-slate-800/10 my-auto">
        <div class="text-center mb-8 flex flex-col items-center">
            <img src="logo.png" alt="Escudo" class="w-16 h-16 object-contain rounded-2xl shadow-md border border-slate-100 bg-white p-1 mb-4">
            <h2 class="text-2xl font-extrabold text-slate-900 tracking-tight">Acceso Restringido</h2>
            <p class="text-slate-500 text-sm mt-1">Solo para líderes comunitarios autorizados</p>
        </div>

        <form onsubmit="iniciarSesion(event)" class="space-y-4">
            <div>
                <label class="block text-slate-700 font-bold text-xs uppercase tracking-wider mb-2">Usuario</label>
                <input type="text" id="usuario" class="w-full border border-slate-200 rounded-xl p-3.5 bg-slate-50/50 text-slate-700 text-sm focus:outline-none focus:ring-2 focus:ring-blue-600 focus:bg-white transition" placeholder="admin" required>
            </div>
            <div>
                <label class="block text-slate-700 font-bold text-xs uppercase tracking-wider mb-2">Contraseña</label>
                <input type="password" id="clave" class="w-full border border-slate-200 rounded-xl p-3.5 bg-slate-50/50 text-slate-700 text-sm focus:outline-none focus:ring-2 focus:ring-blue-600 focus:bg-white transition" placeholder="••••" required>
            </div>
            <button type="submit" class="w-full bg-blue-600 text-white font-bold py-4 rounded-xl shadow-lg shadow-blue-600/25 hover:bg-blue-700 transition text-sm tracking-wide mt-2">Entrar al Panel</button>
        </form>
        
        <div class="mt-6 text-center">
            <a href="index.html" class="text-xs text-slate-500 hover:text-blue-600 font-semibold transition inline-block py-2">&larr; Volver al Inicio</a>
        </div>
    </div>

    <script>
        function iniciarSesion(e) {
            e.preventDefault();
            // .toLowerCase() en el usuario evita errores por mayúsculas
            const usu = document.getElementById('usuario').value.trim().toLowerCase();
            const pass = document.getElementById('clave').value.trim();

            // 📋 Usuarios válidos con sus claves (las llaves deben ir en minúsculas)
            const usuariosValidos = {
                "admin": "admin",
                "rafael": "18307764",
                "bani": "Bani",
                "coordinador": "admin"
            };

            // Valida si el usuario existe y si su contraseña coincide
            if (usuariosValidos[usu] && usuariosValidos[usu] === pass) {
                localStorage.setItem('sesion_lider', 'activa');
                window.location.href = 'dashboard.html';
            } else {
                alert('Usuario o contraseña incorrectos.');
            }
        }
    </script>
</body>
</html>
