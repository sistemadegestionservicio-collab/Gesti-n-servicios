<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reportar Incidencia - Comunidad</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-slate-50 via-blue-50/20 to-slate-100 font-sans min-h-screen flex flex-col justify-between selection:bg-blue-600 selection:text-white">

    <nav class="bg-white/80 backdrop-blur-md border-b border-slate-200/80 shadow-sm">
        <div class="max-w-6xl mx-auto px-4 md:px-6 py-3.5 flex justify-between items-center">
            <div class="flex items-center space-x-2.5 md:space-x-3.5">
                <img src="logo.png" alt="Escudo" class="w-10 h-10 md:w-11 md:h-11 object-contain rounded-xl shadow-md border border-slate-100 bg-white p-0.5">
                <div>
                    <h1 class="text-sm md:text-base font-extrabold text-slate-900 tracking-tight leading-none">Comunidad Activa</h1>
                    <span class="text-[10px] md:text-xs text-blue-600 font-semibold tracking-wide">Módulo Ciudadano</span>
                </div>
            </div>
            <a href="index.html" class="text-slate-600 hover:text-blue-600 font-medium text-xs md:text-sm transition flex items-center space-x-1.5">
                <span>&larr; Volver al Inicio</span>
            </a>
        </div>
    </nav>

    <div class="max-w-xl mx-auto my-8 md:my-12 w-full px-4">
        <div class="bg-white p-6 md:p-10 rounded-3xl shadow-xl shadow-slate-200/60 border border-slate-100">
            <div class="mb-8">
                <h2 class="text-xl md:text-2xl font-extrabold text-slate-900 tracking-tight">Reportar Nueva Incidencia</h2>
                <p class="text-slate-500 text-xs md:text-sm mt-1">Completa los datos del problema detectado en tu sector.</p>
            </div>
            
            <form id="form-reporte" class="space-y-5">
                <div>
                    <label class="block text-slate-700 font-bold text-xs uppercase tracking-wider mb-2">Tipo de Servicio</label>
                    <select id="servicio" class="w-full border border-slate-200 rounded-xl p-3.5 bg-slate-50/50 text-slate-700 text-sm focus:outline-none focus:ring-2 focus:ring-blue-600 focus:bg-white transition" required>
                        <option value="">Seleccione una opción</option>
                        <option value="Alumbrado Público">Alumbrado Público</option>
                        <option value="Vialidad">Vialidad (Baches/Huecos)</option>
                        <option value="Agua y Saneamiento">Agua y Saneamiento</option>
                    </select>
                </div>

                <div>
                    <label class="block text-slate-700 font-bold text-xs uppercase tracking-wider mb-2">Descripción del Problema</label>
                    <textarea id="descripcion" rows="4" class="w-full border border-slate-200 rounded-xl p-3.5 bg-slate-50/50 text-slate-700 text-sm focus:outline-none focus:ring-2 focus:ring-blue-600 focus:bg-white transition" placeholder="Describa brevemente la falla..." required></textarea>
                </div>

                <div>
                    <label class="block text-slate-700 font-bold text-xs uppercase tracking-wider mb-2">Ubicación (Geolocalización)</label>
                    <div class="flex flex-col sm:flex-row gap-2">
                        <input type="text" id="ubicacion" class="w-full border border-slate-200 rounded-xl p-3.5 bg-slate-100 font-mono text-xs text-slate-600 focus:outline-none" placeholder="Haga clic en GPS" readonly required>
                        <button type="button" onclick="obtenerUbicacion()" class="bg-slate-900 text-white px-5 py-3.5 rounded-xl hover:bg-slate-800 transition font-bold text-xs tracking-wider uppercase shadow-md shadow-slate-900/10 whitespace-nowrap"> 🗺️ GPS</button>
                    </div>
                </div>

                <div>
                    <label class="block text-slate-700 font-bold text-xs uppercase tracking-wider mb-2">Evidencia Fotográfica</label>
                    <input type="file" id="foto" accept="image/*" class="w-full border border-slate-200 rounded-xl p-3 bg-slate-50/50 text-slate-600 text-xs file:mr-4 file:py-2 file:px-4 file:rounded-xl file:border-0 file:text-xs file:font-bold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100 transition">
                </div>

                <button type="submit" id="btn-enviar" class="w-full bg-blue-600 text-white font-bold py-4 rounded-xl shadow-lg shadow-blue-600/25 hover:bg-blue-700 transition text-sm tracking-wide mt-2">Enviar Reporte</button>
            </form>
        </div>
    </div>

    <footer class="text-center py-6 text-slate-400 text-xs border-t border-slate-200/60 bg-white/40 px-4">
        Comunidad Activa &copy; 2026
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBuDDldid8lOu4MRZEXVTxylubhRTjN8iU",
            authDomain: "comunidadactiva-44f87.firebaseapp.com",
            projectId: "comunidadactiva-44f87",
            storageBucket: "comunidadactiva-44f87.firebasestorage.app",
            messagingSenderId: "988839148130",
            appId: "1:988839148130:web:57cc762c24ac009628af3b"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.obtenerUbicacion = function() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(function(position) {
                    const lat = position.coords.latitude;
                    const lon = position.coords.longitude;
                    document.getElementById('ubicacion').value = `${lat.toFixed(6)}, ${lon.toFixed(6)}`;
                }, function(error) {
                    alert('No se pudo obtener la ubicación.');
                });
            } else {
                alert('La geolocalización no es compatible.');
            }
        };

        function comprimirImagen(file, callback) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    const MAX_WIDTH = 800;
                    const MAX_HEIGHT = 800;
                    let width = img.width;
                    let height = img.height;

                    if (width > height) {
                        if (width > MAX_WIDTH) {
                            height *= MAX_WIDTH / width;
                            width = MAX_WIDTH;
                        }
                    } else {
                        if (height > MAX_HEIGHT) {
                            width *= MAX_HEIGHT / height;
                            height = MAX_HEIGHT;
                        }
                    }

                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    
                    const dataUrl = canvas.toDataURL('image/jpeg', 0.7);
                    callback(dataUrl);
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        document.getElementById('form-reporte').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const btn = document.getElementById('btn-enviar');
            btn.innerText = 'Enviando a la nube...';
            btn.disabled = true;

            const servicio = document.getElementById('servicio').value;
            const descripcion = document.getElementById('descripcion').value;
            const ubicacion = document.getElementById('ubicacion').value;
            const fotoInput = document.getElementById('foto');

            if (fotoInput.files.length > 0) {
                comprimirImagen(fotoInput.files[0], function(base64Optimizado) {
                    procesarGuardado(db, servicio, descripcion, ubicacion, base64Optimizado, btn);
                });
            } else {
                procesarGuardado(db, servicio, descripcion, ubicacion, null, btn);
            }
        });

        async function procesarGuardado(db, servicio, descripcion, ubicacion, fotoBase64, btn) {
            const nuevoId = Math.floor(1000 + Math.random() * 9000);
            const fechaActual = new Date().toLocaleDateString();

            try {
                await addDoc(collection(db, "reportes"), {
                    id: nuevoId,
                    servicio: servicio,
                    descripcion: descripcion,
                    ubicacion: ubicacion,
                    foto: fotoBase64 || '',
                    estatus: 'Pendiente',
                    fecha: fechaActual,
                    notas: [`${fechaActual}: Reporte creado por el vecino.`]
                });

                alert('¡Reporte enviado con éxito a la nube!');
                window.location.href = 'index.html';
            } catch (error) {
                console.error("Error al guardar: ", error);
                alert("Hubo un error al enviar el reporte. Verifique su conexión.");
                btn.innerText = 'Enviar Reporte';
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
